<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otter Village 🦦</title>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦦</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Login screen -->
    <div id="login">
      <div class="login-card">
        <h1>🦦 Otter Village</h1>
        <p>A cozy multiplayer world</p>
        <input type="text" id="nameInput" placeholder="Your name..." maxlength="16" autocomplete="off" />
        <div class="animal-select">
          <span class="label">Choose your animal:</span>
          <div class="animal-grid" id="animalGrid"></div>
        </div>
        <button id="joinBtn">Join Village</button>
      </div>
    </div>

    <!-- Game canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD overlay -->
    <div id="hud" class="hidden">
      <!-- Top bar -->
      <div id="topBar">
        <div id="playerCount">🦦 0 online</div>
        <div id="gameTitle">Otter Village</div>
        <div id="clock">☀️ Day</div>
      </div>

      <!-- Chat -->
      <div id="chatBox">
        <div id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="Press Enter to chat..." maxlength="200" autocomplete="off" />
      </div>

      <!-- Emote bar -->
      <div id="emoteBar">
        <button class="emote-btn" data-emote="wave">👋</button>
        <button class="emote-btn" data-emote="heart">❤️</button>
        <button class="emote-btn" data-emote="laugh">😂</button>
        <button class="emote-btn" data-emote="sad">😢</button>
        <button class="emote-btn" data-emote="angry">😠</button>
        <button class="emote-btn" data-emote="dance">💃</button>
        <button class="emote-btn" data-emote="sleep">😴</button>
        <button class="emote-btn" data-emote="wave2">🖐️</button>
      </div>

      <!-- Player list -->
      <div id="playerList">
        <div class="player-list-header">Villagers</div>
        <div id="playerListItems"></div>
      </div>

      <!-- Controls hint -->
      <div id="controls">
        WASD/Arrows: Move · Enter: Chat · 1-8: Emotes
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
