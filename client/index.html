<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Otter Village 🦦</title>
  <meta name="description" content="A cozy 3D multiplayer village — Animal Crossing style. Walk around, chat, and hang out with friends." />
  <meta name="theme-color" content="#1a3a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Otter Village" />
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦦</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦦</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Loading overlay -->
    <div id="loadingOverlay" class="hidden">
      <div class="loading-spinner"></div>
      <p>Entering the village...</p>
    </div>

    <!-- Login screen -->
    <div id="login">
      <div class="login-card">
        <h1>🦦 Otter Village</h1>
        <p>A cozy multiplayer world</p>
        <input type="text" id="nameInput" placeholder="Your name..." maxlength="16" autocomplete="off" spellcheck="false" />
        <div class="animal-select">
          <span class="label">Choose your animal</span>
          <div class="animal-grid" id="animalGrid"></div>
        </div>
        <button id="joinBtn">Enter Village</button>
      </div>
    </div>

    <!-- Game canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Virtual joystick zone (mobile) -->
    <div id="joystickZone"></div>

    <!-- HUD overlay -->
    <div id="hud" class="hidden">
      <!-- Top bar -->
      <div id="topBar">
        <div id="playerCount">🦦 0 online</div>
        <div id="gameTitle">Otter Village</div>
        <div id="clock">☀️ Day</div>
      </div>

      <!-- Player list (top-right dropdown) -->
      <div id="playerList">
        <button id="playerListToggle" class="player-list-header">Villagers <span id="playerListArrow">▾</span></button>
        <div id="playerListItems" class="player-list-body"></div>
      </div>

      <!-- Chat -->
      <div id="chatBox">
        <div id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="Tap to chat..." maxlength="200" autocomplete="off" spellcheck="false" />
      </div>

      <!-- Emote bar -->
      <div id="emoteBar">
        <button class="emote-btn" data-emote="wave" title="Wave (1)">👋</button>
        <button class="emote-btn" data-emote="heart" title="Heart (2)">❤️</button>
        <button class="emote-btn" data-emote="laugh" title="Laugh (3)">😂</button>
        <button class="emote-btn" data-emote="sad" title="Sad (4)">😢</button>
        <button class="emote-btn" data-emote="angry" title="Angry (5)">😠</button>
        <button class="emote-btn" data-emote="dance" title="Dance (6)">💃</button>
        <button class="emote-btn" data-emote="sleep" title="Sleep (7)">😴</button>
        <button class="emote-btn" data-emote="wave2" title="High Five (8)">🖐️</button>
      </div>

      <!-- Controls hint (desktop only) -->
      <div id="controls">
        WASD / Arrows: Move · Enter: Chat · 1–8: Emotes
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
